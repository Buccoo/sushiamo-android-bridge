name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing files
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.jks
          cat > keystore.properties <<'EOF'
          storeFile=./release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: gradle :app:assembleRelease

      - name: Prepare release artifact name
        run: |
          set -euo pipefail
          SOURCE_APK=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          cp "$SOURCE_APK" app/build/outputs/apk/release/sushiamo-android-bridge.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sushiamo-android-bridge-apk
          path: app/build/outputs/apk/release/sushiamo-android-bridge.apk

      - name: Create GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/sushiamo-android-bridge.apk
          generate_release_notes: true
